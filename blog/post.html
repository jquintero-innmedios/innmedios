<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artículo · inn<span>medios</span></title>
<link href="https://fonts.cdnfonts.com/css/nexa" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a09;
  --bone:#F2EDE4;
  --red:#C8152A;
  --red-dark:#9e0f20;
  --muted:rgba(242,237,228,0.45);
  --border:rgba(242,237,228,0.1);
  --nexa:'Nexa',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--bone);font-family:var(--nexa);overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.6rem 3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,9,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--nexa);font-size:1.15rem;font-weight:900;letter-spacing:0.1em;color:var(--bone);text-decoration:none}
.logo span{color:var(--red)}
nav ul{list-style:none;display:flex;gap:2.5rem}
nav a{color:var(--muted);text-decoration:none;font-size:0.6rem;letter-spacing:0.25em;text-transform:none;font-weight:700;transition:color 0.3s}
nav a:hover{color:var(--bone)}
.nav-cta{background:var(--red);color:var(--bone)!important;padding:0.5rem 1.2rem}

.post-hero{height:70vh;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:4rem 3rem}
.post-hero-img{position:absolute;inset:0;background:#161410}
.post-hero-img img{width:100%;height:100%;object-fit:cover;opacity:0.6}
.post-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,9,0.95) 0%,rgba(10,10,9,0.2) 60%,transparent 100%)}
.post-hero-content{position:relative;z-index:2;max-width:800px}
.post-cat{font-size:0.55rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.8rem}
.post-cat::before{content:'';display:block;width:20px;height:1px;background:var(--red)}
.post-hero h1{font-family:var(--nexa);font-size:clamp(2rem,4.5vw,4rem);font-weight:900;line-height:1;color:var(--bone);margin-bottom:1rem}
.post-meta{font-size:0.58rem;letter-spacing:0.2em;color:var(--muted);font-weight:300}

.post-body{max-width:720px;margin:0 auto;padding:5rem 3rem 7rem}
.post-resumen{font-family:var(--nexa);font-size:1.1rem;font-weight:300;color:rgba(242,237,228,0.7);line-height:1.8;margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid var(--border)}
.post-content{font-size:0.85rem;letter-spacing:0.05em;color:rgba(242,237,228,0.75);line-height:2.2;font-weight:300}
.post-content h2{font-family:var(--nexa);font-size:1.4rem;font-weight:900;color:var(--bone);margin:2.5rem 0 1rem}
.post-content h3{font-family:var(--nexa);font-size:1.1rem;font-weight:700;color:var(--bone);margin:2rem 0 0.8rem}
.post-content p{margin-bottom:1.5rem}
.post-content strong{color:var(--bone);font-weight:700}
.post-content em{color:var(--red);font-style:normal}

.post-back{margin-bottom:2rem}
.back-btn{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.55rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;font-weight:700;text-decoration:none;transition:color 0.3s}
.back-btn:hover{color:var(--bone)}
.back-btn::before{content:'←'}

footer{padding:3rem;background:#050504;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:var(--nexa);font-size:1rem;font-weight:900;letter-spacing:0.1em}
.footer-logo span{color:var(--red)}
.footer-copy{font-size:0.52rem;letter-spacing:0.15em;color:rgba(242,237,228,0.2)}

@media(max-width:900px){
  nav{padding:1.2rem 1.5rem}
  nav ul{display:none}
  .post-hero{height:50vh;padding:2rem 1.5rem}
  .post-body{padding:3rem 1.5rem 5rem}
  footer{flex-direction:column;gap:1rem;text-align:center}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">inn<span>medios</span></a>
  <ul>
    <li><a href="/#servicios">Servicios</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#contacto" class="nav-cta">Contacto</a></li>
  </ul>
</nav>

<div class="post-hero" id="post-hero">
  <div class="post-hero-img"><img id="post-img" src="" alt=""></div>
  <div class="post-hero-overlay"></div>
  <div class="post-hero-content">
    <div class="post-cat" id="post-cat"></div>
    <h1 id="post-title">Cargando...</h1>
    <div class="post-meta" id="post-meta"></div>
  </div>
</div>

<div class="post-body">
  <div class="post-back">
    <a href="/blog" class="back-btn">Volver al blog</a>
  </div>
  <div class="post-resumen" id="post-resumen"></div>
  <div class="post-content" id="post-content"></div>
</div>

<footer>
  <div class="footer-logo">inn<span>medios</span></div>
  <div class="footer-copy">© 2025 innmedios · Caribe colombiano</div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');

if (!slug) {
  window.location.href = '/blog';
}

fetch(`https://api.github.com/repos/jquintero-innmedios/innmedios/contents/blog/posts/${slug}.md`)
  .then(r => r.json())
  .then(file => fetch(file.download_url).then(r => r.text()))
  .then(content => {
    const meta = {};
    const fm = content.match(/---\n([\s\S]*?)\n---/);
    if (fm) fm[1].split('\n').forEach(line => {
      const [key, ...val] = line.split(':');
      if (key) meta[key.trim()] = val.join(':').trim().replace(/^"|"$/g, '');
    });

    const body = content.replace(/---\n[\s\S]*?\n---/, '').trim();

    document.title = `${meta.titulo || 'Artículo'} · innmedios`;
    document.getElementById('post-title').textContent = meta.titulo || '';
    document.getElementById('post-cat').textContent = meta.categoria || '';
    document.getElementById('post-meta').textContent = `${meta.fecha || ''} · ${meta.lectura || '5'} min lectura`;
    document.getElementById('post-resumen').textContent = meta.resumen || '';
    document.getElementById('post-img').src = meta.imagen || '';
    document.getElementById('post-img').alt = meta.titulo || '';

    // Convertir markdown básico a HTML
    const html = body
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^## (.*)/gm, '<h2>$1</h2>')
      .replace(/^### (.*)/gm, '<h3>$1</h3>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<h[23]>)/, '<p>')
      + '</p>';

    document.getElementById('post-content').innerHTML = html;
  })
  .catch(() => {
    document.getElementById('post-title').textContent = 'Artículo no encontrado';
    document.getElementById('post-content').innerHTML = '<p>Este artículo no existe o fue eliminado.</p>';
  });
</script>

</body>
</html>
