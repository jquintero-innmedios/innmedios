<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · inn<span>medios</span></title>
<link href="https://fonts.cdnfonts.com/css/nexa" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a09;
  --bone:#F2EDE4;
  --red:#C8152A;
  --red-dark:#9e0f20;
  --muted:rgba(242,237,228,0.45);
  --border:rgba(242,237,228,0.1);
  --nexa:'Nexa',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--bone);font-family:var(--nexa);overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.6rem 3rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,9,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--nexa);font-size:1.15rem;font-weight:900;letter-spacing:0.1em;color:var(--bone);text-decoration:none}
.logo span{color:var(--red)}
nav ul{list-style:none;display:flex;gap:2.5rem}
nav a{color:var(--muted);text-decoration:none;font-size:0.6rem;letter-spacing:0.25em;text-transform:none;font-weight:700;transition:color 0.3s}
nav a:hover{color:var(--bone)}
.nav-cta{background:var(--red);color:var(--bone)!important;padding:0.5rem 1.2rem}

.blog-hero{padding:10rem 3rem 4rem;border-bottom:1px solid var(--border)}
.blog-hero-inner{max-width:1200px;margin:0 auto}
.blog-tag{font-size:0.58rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--red);font-weight:700;display:flex;align-items:center;gap:0.8rem;margin-bottom:1.5rem}
.blog-tag::before{content:'';display:block;width:20px;height:1px;background:var(--red)}
.blog-hero h1{font-family:var(--nexa);font-size:clamp(3rem,6vw,5.5rem);font-weight:900;line-height:0.95;color:var(--bone)}

.blog-content{padding:4rem 3rem 7rem;max-width:1200px;margin:0 auto}

/* GRID TIPO REVISTA */
.magazine-grid{display:grid;gap:3px}
.post-featured{grid-column:1/-1;display:grid;grid-template-columns:1.2fr 1fr;gap:3px;margin-bottom:3px}
.post-featured .pf-img{height:520px;overflow:hidden;position:relative;background:#161410;cursor:pointer}
.post-featured .pf-img img{width:100%;height:100%;object-fit:cover;opacity:0.8;transform:scale(1.03);transition:transform 0.6s,opacity 0.4s}
.post-featured .pf-img:hover img{transform:scale(1);opacity:0.95}
.post-featured .pf-body{background:#111;padding:3rem;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;transition:background 0.3s}
.post-featured .pf-body:hover{background:#161410}
.post-secondary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.post-card{position:relative;overflow:hidden;cursor:pointer;background:#111}
.post-card .pc-img{height:260px;overflow:hidden}
.post-card .pc-img img{width:100%;height:100%;object-fit:cover;opacity:0.75;transform:scale(1.03);transition:transform 0.6s,opacity 0.4s}
.post-card:hover .pc-img img{transform:scale(1);opacity:0.9}
.post-card .pc-body{padding:1.5rem}
.post-card:hover{background:#161410}

.pc-cat,.pf-cat{font-size:0.52rem;letter-spacing:0.35em;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:0.7rem}
.pc-title{font-family:var(--nexa);font-size:0.95rem;font-weight:900;color:var(--bone);line-height:1.2;margin-bottom:0.5rem}
.pf-title{font-family:var(--nexa);font-size:clamp(1.5rem,2.5vw,2.2rem);font-weight:900;color:var(--bone);line-height:1.1;margin-bottom:1rem}
.pc-meta,.pf-meta{font-size:0.55rem;letter-spacing:0.15em;color:var(--muted);font-weight:300;margin-bottom:0.8rem}
.pf-resumen{font-size:0.65rem;letter-spacing:0.1em;color:var(--muted);line-height:2;margin-bottom:1.5rem;font-weight:300}
.read-btn{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.55rem;letter-spacing:0.2em;color:var(--red);text-transform:uppercase;font-weight:700;text-decoration:none;transition:gap 0.3s}
.read-btn:hover{gap:0.8rem}
.read-btn::after{content:'→'}

.load-more{text-align:center;margin-top:4rem}
.load-more button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:1rem 3rem;font-family:var(--nexa);font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;font-weight:700;transition:all 0.3s}
.load-more button:hover{border-color:var(--red);color:var(--red)}

footer{padding:3rem;background:#050504;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:var(--nexa);font-size:1rem;font-weight:900;letter-spacing:0.1em}
.footer-logo span{color:var(--red)}
.footer-copy{font-size:0.52rem;letter-spacing:0.15em;color:rgba(242,237,228,0.2)}

.empty-state{text-align:center;padding:5rem 0;color:var(--muted);font-size:0.7rem;letter-spacing:0.15em}

@media(max-width:900px){
  nav{padding:1.2rem 1.5rem}
  nav ul{display:none}
  .blog-hero{padding:8rem 1.5rem 3rem}
  .blog-content{padding:3rem 1.5rem 5rem}
  .post-featured{grid-template-columns:1fr}
  .post-featured .pf-img{height:300px}
  .post-secondary{grid-template-columns:1fr}
  footer{flex-direction:column;gap:1rem;text-align:center}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">inn<span>medios</span></a>
  <ul>
    <li><a href="/#servicios">Servicios</a></li>
    <li><a href="/blog">Blog</a></li>
    <li><a href="/#contacto" class="nav-cta">Contacto</a></li>
  </ul>
</nav>

<div class="blog-hero">
  <div class="blog-hero-inner">
    <div class="blog-tag">Blog</div>
    <h1>Historias<br>recientes</h1>
  </div>
</div>

<div class="blog-content">
  <div id="magazine-grid" class="magazine-grid">
    <div class="empty-state">Cargando historias...</div>
  </div>
  <div class="load-more">
    <button id="load-more-btn" style="display:none">Ver más historias</button>
  </div>
</div>

<footer>
  <div class="footer-logo">inn<span>medios</span></div>
  <div class="footer-copy">© 2025 innmedios · Caribe colombiano</div>
</footer>

<script>
let allPosts = [];
let shown = 0;
const PER_PAGE = 6;

fetch('https://api.github.com/repos/jquintero-innmedios/innmedios/contents/blog/posts')
  .then(r => r.json())
  .then(files => {
    const mds = files.filter(f => f.name.endsWith('.md'));
    return Promise.all(mds.map(f =>
      fetch(f.download_url).then(r => r.text()).then(content => {
        const meta = {};
        const fm = content.match(/---\n([\s\S]*?)\n---/);
        if (fm) fm[1].split('\n').forEach(line => {
          const [key, ...val] = line.split(':');
          if (key) meta[key.trim()] = val.join(':').trim().replace(/^"|"$/g, '');
        });
        meta.slug = f.name.replace('.md', '');
        meta.content = content.replace(/---\n[\s\S]*?\n---/, '').trim();
        return meta;
      })
    ));
  })
  .then(posts => {
    allPosts = posts.reverse();
    renderPosts();
  })
  .catch(() => {
    document.getElementById('magazine-grid').innerHTML = '<div class="empty-state">No hay artículos publicados aún.</div>';
  });

function renderPosts() {
  const grid = document.getElementById('magazine-grid');
  const batch = allPosts.slice(shown, shown + PER_PAGE);
  if (shown === 0) grid.innerHTML = '';

  batch.forEach((post, i) => {
    const isFirst = shown === 0 && i === 0;
    const el = document.createElement('div');

    if (isFirst) {
      el.className = 'post-featured';
      el.innerHTML = `
        <div class="pf-img" onclick="location.href='/blog/post.html?slug=${post.slug}'">
          <img src="${post.imagen || ''}" alt="${post.titulo}">
        </div>
        <div class="pf-body" onclick="location.href='/blog/post.html?slug=${post.slug}'">
          <div>
            <div class="pf-cat">${post.categoria || ''}</div>
            <div class="pf-title">${post.titulo || ''}</div>
            <div class="pf-meta">${post.fecha || ''} · ${post.lectura || '5'} min lectura</div>
            <div class="pf-resumen">${post.resumen || ''}</div>
            <a href="/blog/post.html?slug=${post.slug}" class="read-btn">Leer artículo</a>
          </div>
        </div>`;
      grid.appendChild(el);
    } else {
      let container = grid.querySelector('.post-secondary:last-child');
      if (!container || container.children.length >= 3) {
        container = document.createElement('div');
        container.className = 'post-secondary';
        grid.appendChild(container);
      }
      const card = document.createElement('div');
      card.className = 'post-card';
      card.onclick = () => location.href = `/blog/post.html?slug=${post.slug}`;
      card.innerHTML = `
        <div class="pc-img"><img src="${post.imagen || ''}" alt="${post.titulo}"></div>
        <div class="pc-body">
          <div class="pc-cat">${post.categoria || ''}</div>
          <div class="pc-title">${post.titulo || ''}</div>
          <div class="pc-meta">${post.fecha || ''} · ${post.lectura || '5'} min lectura</div>
          <a href="/blog/post.html?slug=${post.slug}" class="read-btn">Leer</a>
        </div>`;
      container.appendChild(card);
    }
  });

  shown += batch.length;
  const btn = document.getElementById('load-more-btn');
  btn.style.display = shown < allPosts.length ? 'inline-block' : 'none';
  btn.onclick = renderPosts;
}
</script>

</body>
</html>
